name: Audios

on:
  workflow_dispatch:

jobs:
  rename:
    runs-on: windows-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Clone repos
        shell: pwsh
        run: |
          git clone https://x-access-token:${{ secrets.PUSH_TOKEN }}@github.com/NowhereArchive/NowhereAudios.git
          git clone https://x-access-token:${{ secrets.PUSH_TOKEN }}@github.com/NowhereArchive/NowhereAudiosBak.git

      - name: Make changes to NowhereDev
        shell: pwsh
        run: |
          cp -r -force NowhereAudios\audio .\NowhereAudiosBak

      - name: Push files to NowhereAudiosBak
        shell: pwsh
        run: |
          cd NowhereAudiosBak
          git config user.name "NowhereArchive"
          git config user.email "178385478+NowhereArchive@users.noreply.github.com"
          
          git add .
          
          $status = git status --porcelain
          if ($status) {
              git commit -m "Updates"
              git push origin main
          } else {
              Write-Host "No changes to commit"
          }