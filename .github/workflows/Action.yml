name: Rename Audio Files

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run - print renames without applying"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  rename:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo (rename_audio.py + newJson/)
        uses: actions/checkout@v4

      - name: Clone audio repo
        run: |
          git clone https://x-access-token:${{ secrets.PUSH_TOKEN }}@github.com/NowhereArchive/NowhereAudios4.git

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run rename script
        run: |
          python rename_audio.py \
            --old-dir   ./NowhereAudios4/CharactersJson \
            --new-dir   ./newJson/voicelines \
            --audio-dir ./NowhereAudios4/audio \
            --dry-run   "${{ inputs.dry_run }}"

      - name: Push renamed audio files to NowhereDev2
        if: ${{ inputs.dry_run == 'false' }}
        run: |
          cd NowhereAudios4
          git config user.name  "NowhereArchive"
          git config user.email "178385478+NowhereArchive@users.noreply.github.com"
          # Push to dev repo, not the real one — verify here before touching NowhereAudios4
          git remote add dev https://x-access-token:${{ secrets.PUSH_TOKEN }}@github.com/NowhereArchive/NowhereDev2.git
          git pull dev main
          git add audio/
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: rename audio files and folders to match updated voiceline JSONs"
            git push dev main
          else
            echo "No changes to commit"
          fi