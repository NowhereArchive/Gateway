name: CodeChange
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout local files
        uses: actions/checkout@v4

      - name: Clone main repo
        run: git clone https://github.com/NowhereArchive/nowherearchive.github.io.git target_repo

      - name: Clone destination repo
        run: git clone https://github.com/NowhereArchive/NowhereDev.git

      - name: Add files to destination repo
        shell: pwsh
        run: |
          copy-item -Path "target_repo/characters/CharactersJson" -Destination "NowhereDev/" -Recurse -Force
          copy-item -Path "target_repo/characters/characters.json" -Destination "NowhereDev/" -Force

      - name: Repush
        shell: bash
        run: |
          cd NowhereDev
          git config user.name "NowhereArchive"
          git config user.email "178385478+NowhereArchive@users.noreply.github.com"
          
          # Set remote to your destination repo
          git remote set-url origin https://x-access-token:${{ secrets.PUSH_TOKEN }}@github.com/NowhereArchive/NowhereDev.git
          git add .
          # Check if there are changes before committing to avoid errors
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Updates"
            git push origin main
          else
            echo "No changes to commit"
          fi