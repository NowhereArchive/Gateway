name: CodeChange
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout local files
        uses: actions/checkout@v4

      - name: Clone destination repo
        run: git clone https://github.com/NowhereArchive/NowhereCGs.git

      - name: Add files to destination repo
        shell: pwsh
        run: |
          md NowhereCGs/CGs/WhenRainMeetsGunfire
          copy-item *.png -Destination "NowhereCGs/CGs/WhenRainMeetsGunfire" -Force

      - name: Repush
        shell: bash
        run: |
          cd NowhereCGs
          git config user.name "NowhereArchive"
          git config user.email "178385478+NowhereArchive@users.noreply.github.com"
          
          # Set remote to your destination repo
          git remote set-url origin https://x-access-token:${{ secrets.PUSH_TOKEN }}@github.com/NowhereArchive/NowhereCGs.git
          git add .
          # Check if there are changes before committing to avoid errors
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Updates"
            git push origin main
          else
            echo "No changes to commit"
          fi