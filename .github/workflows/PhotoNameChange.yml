name: Rename Photos

on:
  workflow_dispatch:

jobs:
  rename:
    runs-on: windows-latest

    steps:
      # - name: Checkout this repo
      #   uses: actions/checkout@v4

      - name: Clone NowhereImages repo
        shell: pwsh
        run: |
          git clone https://x-access-token:${{ secrets.PUSH_TOKEN }}@github.com/NowhereArchive/NowhereImages.git

      - name: Make changes to NowhereImages
        shell: pwsh
        run: |
          Rename-Item .\NowhereImages\prison\vautour\vautour.png vautour_bleu.png
          Rename-Item .\NowhereImages\prison\vautour vautour_bleu

          Rename-Item .\NowhereImages\prison\chelsea.png countess_chelsea.png
          Rename-Item .\NowhereImages\prison\chelsea countess_chelsea

          Rename-Item .\NowhereImages\prison\weatherforecast.png weather_forecast.png
          Rename-Item .\NowhereImages\prison\weatherforecast weather_forecast

          Rename-Item .\NowhereImages\prison\mrfox.png mr_fox.png
          Rename-Item .\NowhereImages\prison\mrfox mr_fox

      - name: Push files to NowhereImages
        shell: pwsh
        run: |
          cd NowhereImages
          git config user.name "NowhereArchive"
          git config user.email "178385478+NowhereArchive@users.noreply.github.com"
          
          git add .
          
          $status = git status --porcelain
          if ($status) {
              git commit -m "Updates"
              git push origin main
          } else {
              Write-Host "No changes to commit"
          }