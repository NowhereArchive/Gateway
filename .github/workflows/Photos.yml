name: Photos

on:
  workflow_dispatch:

jobs:
  rename:
    runs-on: windows-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Clone NowhereImages repo
        shell: pwsh
        run: |
          git clone https://x-access-token:${{ secrets.PUSH_TOKEN }}@github.com/NowhereArchive/NowhereImages.git

      - name: Make changes to NowhereImages
        shell: pwsh
        run: |
          copy-item -recurse -force kisugi_ai .\NowhereImages\prison\
          copy-item -recurse -force kisugi_hitomi .\NowhereImages\prison\
          copy-item -recurse -force kisugi_rui .\NowhereImages\prison\

      - name: Push files to NowhereImages
        shell: pwsh
        run: |
          cd NowhereImages
          git config user.name "NowhereArchive"
          git config user.email "178385478+NowhereArchive@users.noreply.github.com"
          
          git add .
          
          $status = git status --porcelain
          if ($status) {
              git commit -m "Updates"
              git push origin main
          } else {
              Write-Host "No changes to commit"
          }